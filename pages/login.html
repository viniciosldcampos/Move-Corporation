<!DOCTYPE html>
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
<title>Move-Corporation</title>
</head> 
<body>
    <div class="container">
        <form id="loginFormUser" class="card">
            <div class="userLogin">
                <h2>Usuário</h2>
                <label for="">E-mail</label>
                    <input type="email" name="" id="emailUser">
                <label for="">Senha</label>
                    <input type="password" name="" id="passwordUser">
                <button>Login Usuário</button>
            </div> 
        </form>
        <form id="loginFormBoss" class="card">
            <div class="bossLogin">
            <h2>Gestor</h2>
                <label for="">E-mail</label>
                    <input type="email" name="" id="emailBoss">
                <label for="">Senha</label>
                    <input type="password" name="" id="passwordBoss">
                    <button>Login Gestor</button>
            </div>
        </form>
    </div>
</body>
<script>
// Login USUÁRIO
document.getElementById('loginFormUser').addEventListener('submit', function(event) {
    event.preventDefault();
    
    let emailUser = document.getElementById('emailUser').value;
    let passwordUser = document.getElementById('passwordUser').value;
    
    // Verificação do Login e senha
    if(emailUser === 'user@email.com' && passwordUser === '123') {
        window.location.href = '../index.html';
        } else {
            alert('Usuário ou senha incorretos');
        }
    }
);

// Login GESTOR
document.getElementById('loginFormBoss').addEventListener('submit', function(event) {
    event.preventDefault(); // preventDefault() evita que a página seja recarregada e o JS executa normalmente.
    
        let emailBoss = document.getElementById('emailBoss').value;
        let passwordBoss = document.getElementById('passwordBoss').value;
    
        // Verificação do Login e senha
        if(emailBoss === 'gestor@email.com' && passwordBoss === '456') {
                window.location.href = '../index.html';
        } else {
            alert('Usuário ou senha incorretos');
        }
    }
);

</script>
</html>
