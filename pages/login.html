<!DOCTYPE html>
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
<title>Move-Corporation</title>
</head> 
<body>
    <div class="container">
        <form id="loginFormUser" class="card">
            <div class="userLogin">
                <h2>Usuário</h2>
                <label for="">E-mail</label>
                    <input type="email" name="" id="emailUser">
                <label for="">Senha</label>
                    <input type="password" name="" id="passwordUser">
                <button>Login Usuário</button>
            </div> 
        </form>
        <form id="loginFormBoss" class="card">
            <div class="bossLogin">
                <h2>Gestor</h2>
                <label for="">E-mail</label>
                    <input type="email" name="" id="emailBoss">
                <label for="">Senha</label>
                <input type="password" name="" id="passwordBoss">
                <button>Login Gestor</button>
            </div>
        </form>
    </div>
</body>
<script>
    
    /* Lista de usuários do sistema.*/
    const users = [
    {
        email: "carlos.martins@empresa.com",
        password: "123",
        name: "Carlos Eduardo Martins",
        registry: "1001",
        departament: "10000",
        type: "user"
    },
    {
        email: "gestor.segtrabalho@empresa.com",
        password: "123",
        name: "Fernanda Oliveira Souza",
        registry: "1002",
        departament: "40000",
        type: "user"
    },
    {
        email: "ricardo.santos@empresa.com",
        password: "123",
        name: "Ricardo Almeida Santos",
        registry: "1003",
        departament: "30000",
        type: "user"
    },
    {
        email: "gestor.financeiro@empresa.com",
        password: "456",
        name: "Roberto Silva",
        registry: "2001",
        departament: "20000",
        type: "boss"
    }
];


/*================================================================*/
// Login USUÁRIO
document.getElementById('loginFormUser').addEventListener('submit', function(event) {
    event.preventDefault();
    
    let emailUser = document.getElementById('emailUser').value;
    let passwordUser = document.getElementById('passwordUser').value;
    
/* Verificação do Login e senha digitada com as informações da lista */
const user = users.find(u => 
    u.email === emailUser &&
        u.password === passwordUser &&
        u.type === "user"
    );

    if(user) {
        localStorage.setItem("userLogged", JSON.stringify(user));
        window.location.href= '../index.html';
    } else {
        alert('Usuário ou senha incorretos');
    }
});

/*================================================================*/
// Login GESTOR
document.getElementById('loginFormBoss').addEventListener('submit', function(event) {
    event.preventDefault(); // preventDefault() evita que a página seja recarregada e o JS executa normalmente.
    
    let emailBoss = document.getElementById('emailBoss').value;
    let passwordBoss = document.getElementById('passwordBoss').value;
        
/* Verificação do Login e senha digitada com as informações da lista */
    const user = users.find(u => 
        u.email === emailBoss &&
        u.password === passwordBoss &&
        u.type === 'boss'
    );

    if(user) {
        localStorage.setItem('userLogged', JSON.stringify(user));
        window.location.href = '../index.html'
    } else {
        alert('Usuário ou senha incorretos');
    }
});

</script>
</html>
