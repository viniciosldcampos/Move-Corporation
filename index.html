<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move-Corporation</title>
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <form action="">
        <h1>Move-Corporation</h1>
        <!-- SEÇÃO: Informações do Solicitante -->
        <div class="numberSolicitation">
            <input type="number" id="numberSolicitation" name="numberSolicitation" placeholder="Numero da Solicitação" disabled>
        </div>
        <div class="dateHourSolicitation">
            <input type="datetime-local" id="datetime-LocalSolicitation" name="numberSolicitation" disabled>
        </div>

        <!-- Campo nome -->
        <section class="section">
            <h2>SEÇÃO: Informações do Solicitante</h2>
            <div class="mainInformation">
                <div class="name">
                    <label for=""></label>
                    <input type="text" placeholder="Digite seu nome completo" disabled>
                </div>
                <!-- Campo de Numero do Registro do Colaborador -->
                <div class="numberRegistry">
                    <label for=""></label>
                    <input type="text" id="numberRegistry" name="numberRegistre" placeholder="Numero do Colaborador" disabled>
                </div>
            </div>
            <!-- Campo de Numero do telefone de contato -->
            <div class="mainContact">
                <!-- Campo de email de contato -->
                <div class="contact-email">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="usuario@dominio.com"
                        pattern="[0-9]{3}-[0-9]{5}-[0-9]{4}">
                </div>
                <div class="contact-phone">
                    <label for="phone">Telefone</label>
                    <input type="tel" id="phone" name="phone" placeholder="(00) 12345-6789"
                        pattern="[0-9]{3}-[0-9]{5}-[0-9]{4}">
                </div>
            </div>
            <!-- Informações do Departamento -->
            <!-- Campo de Nome do Departamento -->
            <div class="informationEnterprise">
                <div class="Departament">
                    <label for="">Departamento</label>
                    <select id="departament" disabled>
                        <!-- <option value=''>9874 - Gestão de Pessoas</option> -->
                    </select>
                </div>
                <!-- Campo do Centro de Custo -->
                <div class="costCenter">
                    <label for="">Centro de Custo</label>
                    <select id="costCenter">
                        <!-- <option value=''>9874 - Gestão de Pessoas</option> -->
                    </select>
                </div>
            </div>
        </section>


        <!-- SEÇÃO: INFORMAÇÕES DO Pedido de Transporte -->


        <section class="section">
            <h2>INFORMAÇÕES DO Pedido de Transporte</h2>
            <!-- Campo do Motivo do Pedido de Transporte -->

            <div class="resquestAbout">
                <label for="">Motivo da Solicitação</label>
                <textarea 
                    class="input-Resquest" 
                    id="request"
                    maxlength="600"
                ></textarea>
            </div>
            
            <!-- Campo de Seleção do Carro -->
            <div class="selectCar">
                <label for="">Veículo</label>
                <select>
                    <option>Carro</option>
                    <option>Van</option>
                    <option>Ônibus</option>
                </select>
            </div>
            
            <!-- Campo de nome dos Passageiros -->
            <div class="passengers">
                <label for="">Passageiro</label>
                <div class="input-group">
                    <input type="text" name="" id="">
                    <button type="button" onclick="addInputPassengers()"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            
            <!-- SEÇÃO: INFORMAÇÕES DATA E HORA DO Pedido de Transporte -->
            
            <!-- Campo da Data e horário de Partida -->
            <div class="dateContainer">
                <div class="dateHour">
                    <div class="container-box">
                        <label>Data</label>
                        <input type="date">
                    </div>

                    <div class="container-box-2">
                        <label>Inicio</label>
                        <input type="time">
                    </div>
                </div>
                
                <!-- Campo de data e hora da Chegada (Destino) -->
                <div class="dateHour">
                    <div>
                        <label>Data</label>
                        <input type="date">
                    </div>

                    <div>
                        <label>Fim</label>
                        <input type="time">
                    </div>
                </div>
            </div>
            
            <!-- Campo de Local de Partida (Origem) e Paradas no Caminho -->
            <div class="localOrigin">
                <label>Local de Origem</label>
                <div class="input-group">
                    <input type="text" name="" id="">
                    <button type="button" onclick="addRouteStop()" class="add-Button"><i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
            
            <!-- Campo de Local de Chegada (Destino) -->
            <div class="localDestination">
                <label>Local de Destino</label>
                <input type="text" name="" id="">
            </div>
        </section>
        <!-- SEÇÃO: INFORMAÇÕES do MOTORISTA  -->
        <section class="sectionDriver">
            <div class="driverInformation">
                <div class="box-1">
                    <label for="interno">Motorista interno
                    <input type="radio" id="interno" name="driverType" value="interno" onclick="abrirModalInternalDriver()" required>
                    </label>
                </div>
            </div>
            <div class="driverInformation">
                <div class="box-2">
                    <label for="externo">Cadastrar Motorista
                    <input type="radio" id="externo" name="driverType" value="externo" onclick="abrirModalExternalDriver()">
                    </label>
                </div>
            </div>
        </section>
        <!-- MODAL - MOTORISTA INTERNO -->
        <div id="modalInternalDriver" class="modal">
            <div class="modal-content">
                <h2>Motoristas Cadastrados</h2>
            </div>
        </div>
        <!-- MODAL - MOTORISTA EXTERNO -->
        <div id="modalExternalDriver" class="modal">
            <div class="modal-content">
                <h2>Cadastro de Motorista Externo</h2>
                    <input type="text" name="" id="" placeholder="Nome do motorista">
                    <input type="text" name="" id="" placeholder="Numero do R.G">
                    <input type="text" name="" id="" placeholder="Numero do CPF">
                    <input type="text" name="" id="" placeholder="Numero da CNH">
                    <input type="file" name="" id="" multiple>
                <button type="button">Salvar</button>
                <button type="button" onclick="fecharModalExternalDriver()">Fechar</button>
            </div>
        </div>
        
        <!-- SEÇÃO: NECESSIDADE DE AJUDANTES E ANEXOS  -->
        <section class="section moreInformationSection">
            <div>
                <label>Ajudantes</label>
                <input type="number" name="" id="" min="0" value="0" step="1" max="50">
            </div>
            <div>
                <label for="">Anexos</label>
                <input type="file" name="" id="">
            </div>
        </section>

        <!-- SEÇÃO: BOTÕES DAS SOLICITAÇÕES -->
        <section class="section bottonsForm">
            <input type="reset" value="Apagar" class="deleteButton">
            <input type="button" value="Voltar" class="backButton">
            <input type="submit" value="Confirmar" class="confirmButton">
        </section>
    </form>
</body>
<script>
    /* Input da Data e hora local atualizada */
    function clockUpdate() {
        const now = new Date();
        
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hour = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        const dateHour = `${year}-${month}-${day}T${hour}:${minutes}`;

        document.getElementById('datetime-LocalSolicitation').value = dateHour;
    } 

    clockUpdate();

    setInterval(clockUpdate, 1000);

const departaments = [

const selectDepartament = document.getElementById('departament');
const selectCostCenter = document.getElementById('costCenter');

    /*Preencher o campo do select Departamentos */
    departaments.forEach(departament => {
        let option = document.createElement('option');
        option.value = departament.code;
        option.text = `${departament.code} - ${departament.name}`
    
        selectDepartament.appendChild(option);
        
    });
    
    /*Preencher o campo do Select Centro de Custo */
    departaments.forEach(departament => {

        departament.costCenters.forEach(costCenter => {

            let option = document.createElement('option');
            option.value = costCenter.code;
            option.text = `${costCenter.code} - ${costCenter.name}`;

            selectCostCenter.appendChild(option);
        });

    });
    /*====================================*/
    /* Preencher dados nome, numero de registro e departamento do usuário logado*/
    const userLogged = JSON.parse(localStorage.getItem('userLogged'));

    if(userLogged) {
        /* Nome*/
        document.querySelector('.name input').value = userLogged.name;
        /* Num do colaborador*/
        document.querySelector('.numberRegistry input').value = userLogged.registry;
        
        /* Departamento*/
        document.getElementById('departament').value = userLogged.departament;
    }


    /*====================================*/
    /* Adicionar botão de Passageiros*/
    function addInputPassengers() {
        let passengers = document.querySelector('.passengers');
        let divPassengersInputs = document.createElement('div');

        divPassengersInputs.classList.add('passenger');
        divPassengersInputs.innerHTML = ` 
            <div class="input-group">
                <input type="text" name="" id="">
                <button type="button" onclick="removeInputPassengers(this)">
                    <i class="fa-solid fa-minus"></i>
                </button>
            </div>
        `;

        passengers.appendChild(divPassengersInputs);
    }

    /* Remover botão de Passageiros*/
    function removeInputPassengers(button) {
        button.closest('.passenger').remove();
    }

    /*====================================*/
    /* Adicionar Paradas no trajeto do Transporte */
    function addRouteStop() {
        let routeStop = document.querySelector('.localOrigin');
        let divLocalOrigin = document.createElement('div');
        
        divLocalOrigin.classList.add('localOrigin');
        divLocalOrigin.innerHTML = `
        <div class="input-group">
            <input type="text" name="" id="">
            <button type="button" onclick="removeInputRouteStop(this)">
                <i class="fa-solid fa-minus"></i>
                </button>
                </div>
                `
                routeStop.appendChild(divLocalOrigin);
            }
            
            /* Remover botão de Paradas do Transporte*/
            function removeInputRouteStop(button) {
                button.closest('.localOrigin').remove();
            }


/*====================================*/
    /* Modal para Adicionar informações do motorista interno */
    function abrirModalInternalDriver() {
        document.getElementById('modalInternalDriver').style.display = 'flex';
    }
    function fecharModalInternalDriver() {
        document.getElementById('modalInternalDriver').style.display = 'none';
    }

    /* Modal para Adicionar informações do motorista externo */
    function abrirModalExternalDriver() {
        document.getElementById('modalExternalDriver').style.display = 'flex';
    }
    function fecharModalExternalDriver() {
        document.getElementById('modalExternalDriver').style.display = 'none';
    }
