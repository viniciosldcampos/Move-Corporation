<!DOCTYPE html>
<html lang="pt-br"> 
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/login.css">
<title>Move-Corporation</title>
</head> 
<body>
    <div class="container">
        <form id="loginFormUser" class="card">
            <div class="userLogin">
                <h2>Usuário</h2>
                <label for="">E-mail</label>
                    <input type="email" name="" id="emailUser">
                <label for="">Senha</label>
                    <input type="password" name="" id="passwordUser">
                <button>Login Usuário</button>
            </div> 
        </form>
        <form id="loginFormBoss" class="card">
            <div class="bossLogin">
                <h2>Gestor</h2>
                <label for="">E-mail</label>
                    <input type="email" name="" id="emailBoss">
                <label for="">Senha</label>
                <input type="password" name="" id="passwordBoss">
                <button>Login Gestor</button>
            </div>
        </form>
    </div>
</body>
<script type="module" src="js/login/users.js"></script>
<script type="module" src="js/login/login.js"></script>
</html>
